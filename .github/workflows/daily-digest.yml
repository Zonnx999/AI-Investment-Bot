name: Daily Digest

# 스케줄 발송은 이제 Oracle 박스의 systemd timer(quant-digest-kr/us)가 담당 — docs/DEPLOYMENT.md.
# GitHub 예약 cron 은 박스와 중복 발송을 막기 위해 비활성(아래 주석). 비상시 workflow_dispatch 로 수동 발송.
#   (참고: 박스는 systemd OnCalendar 의 타임존 지정으로 KST/ET·DST 를 자동 처리 → UTC 게이트 불필요)
on:
  # schedule:                  # ← 박스 systemd timer 로 이전, 중복 방지로 비활성
  #   - cron: "30 23 * * 0-4"  #   08:30 KST (월~금)
  #   - cron: "0 13 * * 1-5"   #   09:00 ET (서머타임)
  #   - cron: "0 14 * * 1-5"   #   09:00 ET (겨울)
  workflow_dispatch:           # 수동 실행 버튼 (비상/테스트 발송)
    inputs:
      market:
        description: "시장 (us=미국 / kr=한국)"
        default: "us"

# 액션 런타임을 Node 24 로 (Node 20 deprecation 경고 제거 — 2026-06 GitHub 마이그레이션)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e ".[hosting]"   # libsql 포함 — Turso 호스팅 DB 접근

      # SQLite 캐시/상태(변화 알림용)를 실행 간 best-effort 로 유지.
      # 클라우드 러너는 ephemeral 이라 캐시 미스 시 그냥 콜드 fetch + 첫 실행 취급.
      - name: Restore data cache
        uses: actions/cache@v4
        with:
          path: data
          key: quantbot-data-${{ github.run_id }}
          restore-keys: quantbot-data-

      - name: Send digest (장 시작 30분 전 창에만)
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Turso 호스팅 DB — 풀유니버스를 클라우드에서도 사용 (없으면 워치리스트 폴백)
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          DISPATCH_MARKET: ${{ github.event.inputs.market }}
        run: |
          python - <<'PY'
          import os, sys, subprocess
          from datetime import datetime
          from zoneinfo import ZoneInfo

          # 수동 실행은 항상 전송 (입력 시장 사용, 기본 us)
          if os.environ.get("GITHUB_EVENT_NAME") == "workflow_dispatch":
              send, market = True, (os.environ.get("DISPATCH_MARKET") or "us")
          else:
              seoul = datetime.now(ZoneInfo("Asia/Seoul"))
              ny = datetime.now(ZoneInfo("America/New_York"))
              # 한국 08:30 창 → 한국 종목, 뉴욕 09시 창 → 미국 종목 (DST 무관하게 정확히 한 번)
              kr_window = (seoul.hour == 8 and 25 <= seoul.minute <= 40)
              us_window = (ny.hour == 9 and ny.minute <= 15)
              send = kr_window or us_window
              market = "kr" if kr_window else "us"

          if not send:
              print("전송 창이 아님 — 스킵")
              sys.exit(0)
          # --no-sync: 구독 동기화(getUpdates)는 상시 봇(scripts/bot.py)이 단독 소유 →
          # cron 은 발송만. 둘 다 폴링하면 offset 경합으로 메시지를 서로 가로챔(Phase 11b).
          sys.exit(subprocess.call([sys.executable, "scripts/send_digest.py", "--market", market, "--no-sync"]))
          PY
