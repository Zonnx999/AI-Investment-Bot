name: Daily Digest

# 한국·미국 장 시작 30분 전 1통씩, 총 2회/일.
#   · 한국: KRX 09:00 개장 → 08:30 KST = 23:30 UTC (한국은 DST 없음)
#   · 미국: NYSE 09:30 개장 → 09:00 ET. GitHub cron 은 UTC 고정이라 DST 를 못 따라가므로
#          13:00·14:00 UTC 둘 다 트리거하고, 아래 게이트로 '뉴욕 09시'일 때만 1회 전송.
on:
  schedule:
    - cron: "30 23 * * 0-4"   # 08:30 KST (월~금) — UTC 일~목
    - cron: "0 13 * * 1-5"    # 09:00 ET (서머타임, 3~11월)
    - cron: "0 14 * * 1-5"    # 09:00 ET (겨울, 11~3월)
  workflow_dispatch:           # 수동 실행 버튼 (게이트 우회 — 언제든 테스트 전송)
    inputs:
      market:
        description: "시장 (us=미국 / kr=한국)"
        default: "us"

# 액션 런타임을 Node 24 로 (Node 20 deprecation 경고 제거 — 2026-06 GitHub 마이그레이션)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e ".[hosting]"   # libsql 포함 — Turso 호스팅 DB 접근

      # SQLite 캐시/상태(변화 알림용)를 실행 간 best-effort 로 유지.
      # 클라우드 러너는 ephemeral 이라 캐시 미스 시 그냥 콜드 fetch + 첫 실행 취급.
      - name: Restore data cache
        uses: actions/cache@v4
        with:
          path: data
          key: quantbot-data-${{ github.run_id }}
          restore-keys: quantbot-data-

      - name: Send digest (크론 표현식으로 시장 판단)
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Turso 호스팅 DB — 풀유니버스를 클라우드에서도 사용 (없으면 워치리스트 폴백)
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          DISPATCH_MARKET: ${{ github.event.inputs.market }}
          # 어떤 크론 표현식이 이 실행을 트리거했는지 — 시간 창 체크 대신 사용.
          # GitHub Actions 스케줄은 수십 분~수 시간 지연될 수 있어 datetime.now() 비교가
          # 신뢰할 수 없음. 크론 표현식 자체로 시장을 판단하면 지연에 무관하게 정확히 동작.
          GITHUB_EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          python - <<'PY'
          import os, sys, subprocess

          event = os.environ.get("GITHUB_EVENT_NAME", "")
          sched = os.environ.get("GITHUB_EVENT_SCHEDULE", "")

          if event == "workflow_dispatch":
              # 수동 실행은 항상 전송 (입력 시장 사용, 기본 us)
              send, market = True, (os.environ.get("DISPATCH_MARKET") or "us")
          elif sched == "30 23 * * 0-4":
              # 한국 크론 (23:30 UTC = 08:30 KST) → 한국 종목
              send, market = True, "kr"
          elif sched in ("0 13 * * 1-5", "0 14 * * 1-5"):
              # 미국 크론 (서머타임/겨울 09:00 ET) → 미국 종목
              send, market = True, "us"
          else:
              send, market = False, "us"

          if not send:
              print(f"알 수 없는 트리거 — 스킵 (event={event!r}, schedule={sched!r})")
              sys.exit(0)
          sys.exit(subprocess.call([sys.executable, "scripts/send_digest.py", "--market", market, "--no-sync"]))
          PY
